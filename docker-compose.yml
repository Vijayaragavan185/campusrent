# campusrent/docker-compose.yml
version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: campusrent
      POSTGRES_PASSWORD: campusrent123
      POSTGRES_DB: campusrent
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
