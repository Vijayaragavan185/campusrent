name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-backend-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Deploy backend to EC2 over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            # Preserve current backend env before git clean removes untracked files.
            if [ -f /home/ubuntu/campusrent/backend/.env ]; then
              cp /home/ubuntu/campusrent/backend/.env /tmp/campusrent_backend.env
            fi

            cd /home/ubuntu/campusrent
            git fetch origin main
            git checkout main
            git clean -fd
            git reset --hard origin/main

            cd backend

            # Write backend .env from GitHub secret when provided.
            if [ -n "${{ secrets.BACKEND_ENV_FILE }}" ]; then
              cat > .env << 'EOF_ENV'
            ${{ secrets.BACKEND_ENV_FILE }}
            EOF_ENV
            fi

            # If secret was missing/invalid, fallback to previously saved EC2 .env.
            if [ ! -s .env ] || grep -q "RDS_ENDPOINT" .env; then
              if [ -f /tmp/campusrent_backend.env ]; then
                cp /tmp/campusrent_backend.env .env
                echo "Using existing EC2 backend/.env because BACKEND_ENV_FILE is missing or contains placeholders."
              fi
            fi

            # Final safety check.
            if [ ! -s .env ]; then
              echo "ERROR: No valid backend/.env found. Set BACKEND_ENV_FILE secret or create backend/.env on EC2."
              exit 1
            fi

            npm install --omit=dev
            npx prisma generate
            npx prisma migrate deploy

            if pm2 describe campusrent-backend > /dev/null 2>&1; then
              pm2 restart campusrent-backend --update-env
            else
              pm2 start ecosystem.config.cjs --env production
            fi

            pm2 save