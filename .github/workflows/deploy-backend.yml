name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-backend-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Deploy backend to EC2 over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            cd /home/ubuntu/campusrent
            git fetch origin main
            git checkout main
            git clean -fd
            git reset --hard origin/main

            cd backend

            # Recreate backend .env from GitHub Actions secret on every deploy.
            cat > .env << 'EOF_ENV'
            ${{ secrets.BACKEND_ENV_FILE }}
            EOF_ENV

            npm install --omit=dev
            npx prisma generate
            npx prisma migrate deploy

            if pm2 describe campusrent-backend > /dev/null 2>&1; then
              pm2 restart campusrent-backend --update-env
            else
              pm2 start ecosystem.config.cjs --env production
            fi

            pm2 save